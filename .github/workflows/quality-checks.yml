name: Quality Checks

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: quality-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  NODE_VERSION: 24

jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist

  preview-deploy:
    name: preview-deploy
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    needs:
      - format
      - lint
      - check
      - build
    env:
      DEPLOY_AUTH_TOKEN: ${{ secrets.DEPLOY_AUTH_TOKEN }}
      DEPLOY_SITE_ID: ${{ secrets.DEPLOY_SITE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist
      - name: Validate deploy secrets
        run: |
          if [ -z "${DEPLOY_AUTH_TOKEN}" ] || [ -z "${DEPLOY_SITE_ID}" ]; then
            echo "::error::Missing DEPLOY_AUTH_TOKEN or DEPLOY_SITE_ID repository secret."
            exit 1
          fi
      - name: Trigger preview deploy
        id: deploy
        run: |
          deploy_alias="pr-${{ github.event.pull_request.number }}"
          pnpm --silent run deploy:preview -- --alias "${deploy_alias}" > deploy-result.json
          node scripts/extract-deploy-url.mjs deploy-result.json >> "$GITHUB_OUTPUT"

          deploy_url="$(node -e 'const fs=require("node:fs");const p=JSON.parse(fs.readFileSync("deploy-result.json","utf8"));process.stdout.write(p.deploy_url||p.url||"")')"
          deploy_host="${deploy_url#https://}"
          deploy_host="${deploy_host#http://}"
          deploy_host="${deploy_host%%/*}"
          base_host="${deploy_host#*--}"
          alias_url="https://${deploy_alias}--${base_host}"

          preview_url="${deploy_url}"
          if curl -fsSI --max-time 10 "${alias_url}" >/dev/null 2>&1; then
            preview_url="${alias_url}"
          fi

          echo "deploy_alias=${deploy_alias}" >> "$GITHUB_OUTPUT"
          echo "preview_url=${preview_url}" >> "$GITHUB_OUTPUT"
      - name: Publish preview URL
        run: |
          deploy_url="${{ steps.deploy.outputs.deploy_url }}"
          preview_url="${{ steps.deploy.outputs.preview_url }}"
          deploy_alias="${{ steps.deploy.outputs.deploy_alias }}"
          {
            echo "### Preview Deploy"
            echo
            echo "Preview URL: ${preview_url}"
            echo
            echo "Deploy Permalink: ${deploy_url}"
            echo
            echo "Alias: ${deploy_alias}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upsert preview comment
        uses: actions/github-script@v7
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deploy_url }}
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          script: |
            const marker = '<!-- preview-deploy-comment -->'
            const issue_number = context.issue.number
            const owner = context.repo.owner
            const repo = context.repo.repo

            const body = [
              marker,
              '### Preview Deploy',
              '',
              `- Preview URL: [${process.env.PREVIEW_URL}](${process.env.PREVIEW_URL})`,
              `- Deploy Permalink: [${process.env.DEPLOY_URL}](${process.env.DEPLOY_URL})`,
            ].join('\n')

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }

  production-deploy:
    name: production-deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs:
      - format
      - lint
      - check
      - build
    env:
      DEPLOY_AUTH_TOKEN: ${{ secrets.DEPLOY_AUTH_TOKEN }}
      DEPLOY_SITE_ID: ${{ secrets.DEPLOY_SITE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist
      - name: Validate deploy secrets
        run: |
          if [ -z "${DEPLOY_AUTH_TOKEN}" ] || [ -z "${DEPLOY_SITE_ID}" ]; then
            echo "::error::Missing DEPLOY_AUTH_TOKEN or DEPLOY_SITE_ID repository secret."
            exit 1
          fi
      - name: Trigger production deploy
        id: deploy
        run: |
          pnpm --silent run deploy:production > deploy-result.json
          node scripts/extract-deploy-url.mjs deploy-result.json >> "$GITHUB_OUTPUT"
      - name: Publish production URL
        run: |
          {
            echo "### Production Deploy"
            echo
            echo "${{ steps.deploy.outputs.deploy_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
